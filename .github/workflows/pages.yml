name: Publish StegGuardian Wiki

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: ST-017 isolated validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Execute Guardian sandbox
        run: python scripts/run_sandbox_validation.py
      - name: Upload Guardian sandbox report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stegguardian-st017-sandbox-report
          path: reports/sandbox-first-validation.report.json
          if-no-files-found: error
          retention-days: 30

  deploy:
    needs: validate
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate LLM free-tier trust page
        run: python scripts/check_llm_free_tier_trust_chain_page.py
      - name: Validate media pipeline Guardian boundary
        run: python scripts/check_media_pipeline_guardian_boundary.py
      - name: Validate page index
        run: python scripts/check_page_index.py
      - name: Validate page relationship graph
        run: python scripts/check_page_relationship_graph.py
      - name: Validate cross-wiki metadata graph
        run: python scripts/check_cross_wiki_metadata_graph.py
      - name: Validate cross-wiki health status
        run: python scripts/check_cross_wiki_health_status.py
      - name: Validate ecosystem documentation endpoints
        run: python scripts/check_ecosystem_documentation_endpoints.py
      - name: Validate live public record URL verification
        run: python scripts/check_live_public_record_url_verification.py
      - name: Validate live public record fetch tooling
        run: python scripts/check_live_public_record_fetch_tooling.py
      - name: Validate deployment receipt
        run: python scripts/check_deployment_receipt.py
      - name: Validate session coordination status
        run: python scripts/check_session_coordination_status.py
      - name: Validate public records manifest
        run: python scripts/check_public_records_manifest.py
      - name: Validate Pages deployment trigger status
        run: python scripts/check_pages_deployment_trigger_status.py
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Prepare static site
        run: |
          mkdir -p _site/pages _site/data _site/receipts _site/docs
          touch _site/.nojekyll
          cp README.md _site/README.md
          cp data/page-index.json _site/data/page-index.json
          cp data/page-metadata.schema.json _site/data/page-metadata.schema.json
          cp data/page-relationship-graph.json _site/data/page-relationship-graph.json
          cp data/cross-wiki-metadata-graph.json _site/data/cross-wiki-metadata-graph.json
          cp data/cross-wiki-health-status.json _site/data/cross-wiki-health-status.json
          cp data/cross-wiki-health-status.schema.json _site/data/cross-wiki-health-status.schema.json
          cp data/ecosystem-documentation-endpoints.json _site/data/ecosystem-documentation-endpoints.json
          cp data/live-public-record-url-verification.json _site/data/live-public-record-url-verification.json
          cp data/deployment-receipt.json _site/data/deployment-receipt.json
          cp data/session-coordination-status.json _site/data/session-coordination-status.json
          cp data/pages-deployment-trigger-status.json _site/data/pages-deployment-trigger-status.json
          cp data/public-records-manifest.json _site/data/public-records-manifest.json
          cp docs/STEGGUARDIAN_VERIFICATION_STATUS.md _site/docs/STEGGUARDIAN_VERIFICATION_STATUS.md
          cp docs/PAGES_DEPLOYMENT_TRIGGER_DIAGNOSIS.md _site/docs/PAGES_DEPLOYMENT_TRIGGER_DIAGNOSIS.md
          cp docs/LIVE_PUBLIC_RECORD_URL_FETCH_RUNBOOK.md _site/docs/LIVE_PUBLIC_RECORD_URL_FETCH_RUNBOOK.md
          cp receipts/*.json _site/receipts/
          cp pages/*.md _site/pages/
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>StegGuardian Wiki</title>
          </head>
          <body>
            <h1>StegGuardian Wiki</h1>
            <p>Guardian, account, recovery, and boundary documentation.</p>
            <a href="pages/stegtalk-guardian-account-boundary.md">StegTalk Guardian and Account Boundary</a>
            <a href="pages/guardian-account-boundary-vocabulary.md">Guardian Account Boundary Vocabulary</a>
            <a href="pages/recovery-authority.md">Recovery Authority</a>
            <a href="pages/account-federation.md">Account Federation</a>
            <a href="pages/device-bound-guardian-enforcement.md">Device Bound Guardian Enforcement</a>
            <a href="pages/entity-sandbox-runner-repair-reentry-flow.md">Entity Sandbox Runner Repair Reentry Flow</a>
            <a href="pages/llm-free-tier-trust-chain.md">LLM Free Tier Trust Chain</a>
            <a href="pages/media-pipeline-guardian-boundary.md">Media Pipeline Guardian Boundary</a>
            <a href="docs/STEGGUARDIAN_VERIFICATION_STATUS.md">StegGuardian Verification Status</a>
            <a href="docs/PAGES_DEPLOYMENT_TRIGGER_DIAGNOSIS.md">Pages Deployment Trigger Diagnosis</a>
            <a href="docs/LIVE_PUBLIC_RECORD_URL_FETCH_RUNBOOK.md">Live Public Record URL Fetch Runbook</a>
            <a href="data/page-index.json">Page Index</a>
            <a href="data/page-metadata.schema.json">Page Metadata Schema</a>
            <a href="data/page-relationship-graph.json">Page Relationship Graph</a>
            <a href="data/cross-wiki-metadata-graph.json">Cross-Wiki Metadata Graph</a>
            <a href="data/cross-wiki-health-status.json">Cross-Wiki Health Status</a>
            <a href="data/cross-wiki-health-status.schema.json">Cross-Wiki Health Status Schema</a>
            <a href="data/ecosystem-documentation-endpoints.json">Ecosystem Documentation Endpoints</a>
            <a href="data/live-public-record-url-verification.json">Live Public Record URL Verification</a>
            <a href="data/deployment-receipt.json">Deployment Receipt</a>
            <a href="data/session-coordination-status.json">Session Coordination Status</a>
            <a href="data/pages-deployment-trigger-status.json">Pages Deployment Trigger Status</a>
            <a href="data/public-records-manifest.json">Public Records Manifest</a>
          </body>
          </html>
          HTML
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-live-public-records:
    name: Verify deployed machine records
    needs: deploy
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Fetch deployed records with bounded retries
        id: live_records
        shell: bash
        run: |
          set +e
          mkdir -p reports
          result=1
          for attempt in $(seq 1 12); do
            echo "Live record verification attempt ${attempt}/12"
            python scripts/fetch_live_public_record_urls.py --timeout 15 --write-report reports/live-public-record-url-fetch-report.json
            result=$?
            if [ "$result" -eq 0 ]; then break; fi
            if [ "$attempt" -lt 12 ]; then sleep 15; fi
          done
          echo "result=$result" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload live verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stegguardian-live-public-record-url-fetch-report
          path: reports/live-public-record-url-fetch-report.json
          if-no-files-found: error
          retention-days: 30
      - name: Enforce live record verification result
        run: |
          if [ "${{ steps.live_records.outputs.result }}" != "0" ]; then
            echo "Deployed machine-record verification did not converge within the bounded retry window." >&2
            exit 1
          fi
      - name: Write verification summary
        if: always()
        run: |
          echo "## StegGuardian Live Public Record Verification" >> "$GITHUB_STEP_SUMMARY"
          echo "**Report artifact:** stegguardian-live-public-record-url-fetch-report" >> "$GITHUB_STEP_SUMMARY"
          echo "**Bounded retries:** 12 attempts, 15 seconds apart" >> "$GITHUB_STEP_SUMMARY"
          echo "**Authority boundary:** URL availability does not grant standing, guardian authority, or execution authority" >> "$GITHUB_STEP_SUMMARY"
