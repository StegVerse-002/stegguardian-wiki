name: Publish StegGuardian Wiki

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate LLM free-tier trust page
        run: python scripts/check_llm_free_tier_trust_chain_page.py
      - name: Validate page index
        run: python scripts/check_page_index.py
      - name: Validate page relationship graph
        run: python scripts/check_page_relationship_graph.py
      - name: Validate cross-wiki metadata graph
        run: python scripts/check_cross_wiki_metadata_graph.py
      - name: Validate deployment receipt
        run: python scripts/check_deployment_receipt.py
      - name: Validate public records manifest
        run: python scripts/check_public_records_manifest.py
      - name: Validate Pages deployment trigger status
        run: python scripts/check_pages_deployment_trigger_status.py
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Prepare static site
        run: |
          mkdir -p _site/pages _site/data _site/receipts _site/docs
          touch _site/.nojekyll
          cp README.md _site/README.md
          cp data/page-index.json _site/data/page-index.json
          cp data/page-metadata.schema.json _site/data/page-metadata.schema.json
          cp data/page-relationship-graph.json _site/data/page-relationship-graph.json
          cp data/cross-wiki-metadata-graph.json _site/data/cross-wiki-metadata-graph.json
          cp data/deployment-receipt.json _site/data/deployment-receipt.json
          cp data/pages-deployment-trigger-status.json _site/data/pages-deployment-trigger-status.json
          cp data/public-records-manifest.json _site/data/public-records-manifest.json
          cp docs/STEGGUARDIAN_VERIFICATION_STATUS.md _site/docs/STEGGUARDIAN_VERIFICATION_STATUS.md
          cp docs/PAGES_DEPLOYMENT_TRIGGER_DIAGNOSIS.md _site/docs/PAGES_DEPLOYMENT_TRIGGER_DIAGNOSIS.md
          cp receipts/*.json _site/receipts/
          cp pages/*.md _site/pages/
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>StegGuardian Wiki</title>
            <style>body{font-family:system-ui,-apple-system,sans-serif;max-width:900px;margin:40px auto;padding:0 20px;line-height:1.55}a{display:block;margin:.35rem 0}code{background:#f4f4f4;padding:.1rem .25rem}</style>
          </head>
          <body>
            <h1>StegGuardian Wiki</h1>
            <p>Guardian, account, recovery, and boundary documentation.</p>
            <h2>Pages</h2>
            <a href="pages/stegtalk-guardian-account-boundary.md">StegTalk Guardian and Account Boundary</a>
            <a href="pages/guardian-account-boundary-vocabulary.md">Guardian Account Boundary Vocabulary</a>
            <a href="pages/recovery-authority.md">Recovery Authority</a>
            <a href="pages/account-federation.md">Account Federation</a>
            <a href="pages/device-bound-guardian-enforcement.md">Device Bound Guardian Enforcement</a>
            <a href="pages/entity-sandbox-runner-repair-reentry-flow.md">Entity Sandbox Runner Repair Reentry Flow</a>
            <a href="pages/llm-free-tier-trust-chain.md">LLM Free Tier Trust Chain</a>
            <a href="docs/STEGGUARDIAN_VERIFICATION_STATUS.md">StegGuardian Verification Status</a>
            <a href="docs/PAGES_DEPLOYMENT_TRIGGER_DIAGNOSIS.md">Pages Deployment Trigger Diagnosis</a>
            <h2>Machine-readable records</h2>
            <a href="data/page-index.json">Page Index</a>
            <a href="data/page-metadata.schema.json">Page Metadata Schema</a>
            <a href="data/page-relationship-graph.json">Page Relationship Graph</a>
            <a href="data/cross-wiki-metadata-graph.json">Cross-Wiki Metadata Graph</a>
            <a href="data/deployment-receipt.json">Deployment Receipt</a>
            <a href="data/pages-deployment-trigger-status.json">Pages Deployment Trigger Status</a>
            <a href="data/public-records-manifest.json">Public Records Manifest</a>
            <h2>Linked Wikis</h2>
            <a href="https://stegverse-labs.github.io/stegtalk-wiki/">StegTalk Wiki</a>
            <a href="https://stegverse-labs.github.io/admissibility-wiki/">Admissibility Wiki</a>
            <a href="https://stegverse-labs.github.io/Site/">StegVerse Site</a>
          </body>
          </html>
          HTML
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
