name: Sync system-boundary status

on:
  workflow_dispatch:
  schedule:
    - cron: '29 * * * *'

permissions:
  contents: write

concurrency:
  group: stegguardian-system-boundary-status-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Synchronize bounded status
        run: python scripts/sync_system_boundary_status.py
      - name: Commit changed status only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/system-boundary-status.v0.1.json || true
          if git diff --cached --quiet; then
            echo "No Guardian status change."
          else
            git commit -m "Update bounded system-boundary status"
            git pull --rebase
            git push
          fi
